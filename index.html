<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bug Report Form</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      padding: 32px;
      border-radius: 10px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 6px;
      color: #1a1a2e;
      font-size: 22px;
    }

    .subtitle {
      color: #666;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #4f46e5;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .error {
      color: #e53e3e;
      font-size: 12px;
      margin-top: 4px;
      display: none;
    }

    .error.visible {
      display: block;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #4338ca;
    }

    #success-message {
      display: none;
      margin-top: 20px;
      background-color: #f0fff4;
      border: 1px solid #9ae6b4;
      color: #276749;
      padding: 14px 16px;
      border-radius: 6px;
      font-size: 14px;
    }

    #submitted-report {
      margin-top: 28px;
      display: none;
    }

    #submitted-report h3 {
      font-size: 15px;
      color: #1a1a2e;
      margin-bottom: 12px;
      border-bottom: 1px solid #eee;
      padding-bottom: 8px;
    }

    .report-item {
      font-size: 13px;
      color: #444;
      margin-bottom: 8px;
    }

    .report-item span {
      font-weight: 600;
      color: #1a1a2e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🐛 Bug Report Form</h2>
    <p class="subtitle">Fill in the details below to log a bug</p>

    <div class="form-group">
      <label for="reporter-name">Your Name</label>
      <input type="text" id="reporter-name" placeholder="e.g. Beryl Achieng" />
      <p class="error" id="name-error">Name is required</p>
    </div>

    <div class="form-group">
      <label for="bug-title">Bug Title</label>
      <input type="text" id="bug-title" placeholder="e.g. Login button not responding" />
      <p class="error" id="title-error">Bug title must be at least 10 characters</p>
    </div>

    <div class="form-group">
      <label for="severity">Severity</label>
      <select id="severity">
        <option value="">-- Select severity --</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
        <option value="critical">Critical</option>
      </select>
      <p class="error" id="severity-error">Please select a severity level</p>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" placeholder="Describe the bug, steps to reproduce, expected vs actual behaviour..."></textarea>
      <p class="error" id="description-error">Description must be at least 20 characters</p>
    </div>

    <button id="submit-btn">Submit Bug Report</button>

    <div id="success-message">
      ✅ Bug report submitted successfully!
    </div>

    <div id="submitted-report">
      <h3>Submitted Report</h3>
      <div class="report-item"><span>Reporter:</span> <span id="out-name"></span></div>
      <div class="report-item"><span>Title:</span> <span id="out-title"></span></div>
      <div class="report-item"><span>Severity:</span> <span id="out-severity"></span></div>
      <div class="report-item"><span>Description:</span> <span id="out-description"></span></div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
